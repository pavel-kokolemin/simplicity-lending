name: Lint

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'web-v2/**'
  pull_request:
    paths-ignore:
      - 'web-v2/**'
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
      SIMPLEX_VERSION: v0.0.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install simplex-cli via simplexup
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://smplx.simplicity-lang.org | bash
          BASE_DIR="${XDG_CONFIG_HOME:-$HOME}"
          SIMPLEX_DIR="${SIMPLEX_DIR:-$BASE_DIR/.simplex}"
          SIMPLEX_BIN_DIR="$SIMPLEX_DIR/bin"
          "$SIMPLEX_BIN_DIR/simplexup" --install "$SIMPLEX_VERSION"
          echo "$SIMPLEX_BIN_DIR" >> "$GITHUB_PATH"
          "$SIMPLEX_BIN_DIR/simplex" --version

      - name: Generate contract artifacts
        shell: bash
        run: |
          cd crates/contracts
          simplex build
          test -f src/artifacts/mod.rs

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
