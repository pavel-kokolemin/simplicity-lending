# Timestamp to be shared by all deploy jobs in the pipeline
create_timestamp:
  stage: .pre
  variables:
    GIT_STRATEGY: none
  script:
    - export TIMESTAMP=$(date +%Y%m%d%H%M%S)
    - echo "TIMESTAMP=${TIMESTAMP}" >> timestamp.env
    - echo "Generated timestamp ${TIMESTAMP}"
  artifacts:
    reports:
      dotenv: timestamp.env

.auth_gcp:
  variables:
    PROJECT_NUMBER: ${CI_PROJECT_NUMBER}
    POOL_ID: ${CI_POOL_ID}
    PROVIDER_ID: ${CI_PROVIDER_ID}
    SERVICE_ACCOUNT_EMAIL: ${CI_SERVICE_ACCOUNT_EMAIL}
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: ${CI_OIDC_AUDIENCE}
  before_script:
    - echo ${GITLAB_OIDC_TOKEN} > .ci_job_jwt_file
    - export PATH=/opt/google-cloud-sdk/bin:$PATH
    - gcloud iam workload-identity-pools create-cred-config "projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/${POOL_ID}/providers/${PROVIDER_ID}"
      --service-account="${SERVICE_ACCOUNT_EMAIL}"
      --output-file=.gcp_temp_cred.json
      --credential-source-file=.ci_job_jwt_file
    - gcloud auth login --cred-file=.gcp_temp_cred.json --update-adc
    - gcloud auth list
    - gcloud auth configure-docker ${REGION}-docker.pkg.dev

.build_docker:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: manual
  script:
    - PLATFORM=linux/${ARCH}
    - TAG=${CI_COMMIT_SHORT_SHA}-${TIMESTAMP}
    - echo "Using timestamp ${TIMESTAMP} and tag ${TAG}"
    - CONTEXT=${CONTEXT:-.}
    - BUILD_ARG_FLAGS=""
    - |
      for DEFAULT_BUILD_ARG in ${DEFAULT_BUILD_ARGS:-}; do
        DEFAULT_ARG_NAME="${DEFAULT_BUILD_ARG%%=*}"
        DEFAULT_ARG_VALUE="${DEFAULT_BUILD_ARG#*=}"
        if [ "${DEFAULT_ARG_NAME}" = "${DEFAULT_ARG_VALUE}" ]; then
          echo "Invalid default Docker build variable entry: ${DEFAULT_BUILD_ARG}"
          exit 1
        fi
        if [ -z "$(printenv "${DEFAULT_ARG_NAME}" || true)" ]; then
          export "${DEFAULT_ARG_NAME}=${DEFAULT_ARG_VALUE}"
          echo "Using default Docker build variable: ${DEFAULT_ARG_NAME}"
        fi
      done
    - |
      for REQUIRED_ARG in ${REQUIRED_BUILD_ARGS:-}; do
        if [ -z "$(printenv "${REQUIRED_ARG}" || true)" ]; then
          echo "Missing required Docker build variable: ${REQUIRED_ARG}"
          exit 1
        fi
      done
    - |
      for BUILD_ARG in ${DOCKER_BUILD_ARGS:-}; do
        if [ -n "$(printenv "${BUILD_ARG}" || true)" ]; then
          BUILD_ARG_FLAGS="${BUILD_ARG_FLAGS} --build-arg ${BUILD_ARG}"
        fi
      done
    - GAR_IMAGE=${IMAGE}
    - GAR_IMAGE_LATEST=${GAR_IMAGE}:latest
    - GAR_IMAGE_TAG=${GAR_IMAGE}:${TAG}
    - docker buildx create
      --driver=docker-container
      --name=buildkit-builder
      --use
      --platform ${PLATFORM}
    - docker buildx build
      --platform ${PLATFORM}
      --cache-from ${GAR_IMAGE_LATEST}
      --load
      -f ${DOCKERFILE}
      -t ${GAR_IMAGE_LATEST}
      -t ${GAR_IMAGE_TAG}
      ${BUILD_ARG_FLAGS}
      ${CONTEXT}
    - docker push ${GAR_IMAGE_TAG}
    - echo "pushed ${GAR_IMAGE_TAG}"
    - if [ "${CI_COMMIT_BRANCH}" = "${CI_DEFAULT_BRANCH}" ]; then docker push ${GAR_IMAGE_LATEST}; echo "pushed ${GAR_IMAGE_LATEST}"; fi
